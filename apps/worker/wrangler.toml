name = "offerintegrity-worker"
main = "src/index.ts"
compatibility_date = "2024-07-01"
compatibility_flags = ["nodejs_compat"]

[[kv_namespaces]]
binding = "OFFER_KV"
id = "d22cbdcb8e6445b5b8dde2779924e63a"
preview_id = "8d337dd144244fb5ae65f639ff7b04b4"

[vars]
USE_REAL_AI = "false"
WORKER_URL = "https://api.offerintegrity.io"
APP_URL = "https://offerintegrity.io"

# Secrets (set via wrangler secret put):
# STRIPE_SECRET_KEY
# STRIPE_WEBHOOK_SECRET
# RESEND_API_KEY
# OPENAI_API_KEY (optional, only if USE_REAL_AI=true)
# TURNSTILE_SECRET_KEY
[[r2_buckets]]
binding = "OFFER_R2"
bucket_name = "offerintegrity-uploads"