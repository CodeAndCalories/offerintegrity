name = "offerintegrity-worker"
main = "src/index.ts"
compatibility_date = "2024-07-01"
compatibility_flags = ["nodejs_compat"]

[[kv_namespaces]]
binding = "OFFER_KV"
id = "YOUR_KV_NAMESPACE_ID"
preview_id = "YOUR_KV_PREVIEW_NAMESPACE_ID"

[vars]
USE_REAL_AI = "false"
WORKER_URL = "https://worker.offerintegrity.io"
APP_URL = "https://offerintegrity.io"

# Secrets (set via wrangler secret put):
# STRIPE_SECRET_KEY
# STRIPE_WEBHOOK_SECRET
# RESEND_API_KEY
# OPENAI_API_KEY (optional, only if USE_REAL_AI=true)
# TURNSTILE_SECRET_KEY
